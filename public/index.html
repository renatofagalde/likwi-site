<!doctype html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- lambda version -->
  <title>Likwi — Renato Fagalde | Backend, Cloud & Security</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      --bg: #0f1115; --bg-soft:#151822; --border:#222738; --text:#e6e6e6; --muted:#a3aab7; --card:#121626; --accent:#7c8cff;
    }
    html[data-bs-theme="dark"], body { background: var(--bg); color: var(--text); }
    .navbar, .border-bottom, .border-top { border-color: var(--border) !important; }
    .navbar { background: var(--bg-soft); }
    a.nav-link, .navbar-brand { color: var(--text) !important; }
    a.nav-link:hover { color: var(--accent) !important; }
    .hero { padding: 6rem 0; }
    .card { background: var(--card); border-color: var(--border); color: var(--text); }
    .card .text-muted { color: var(--muted) !important; }
    .btn-dark { background:#1f2433; border-color:#1f2433; }
    .btn-dark:hover { background:#2a3146; border-color:#2a3146; }
    footer { color: var(--muted); }
    .dropdown-menu { background: var(--bg-soft); color: var(--text); border-color: var(--border); }
    .dropdown-item { color: var(--text); }
    .dropdown-item:hover { background: var(--card); }
    .footer-links a { color: var(--text); text-decoration: none; }
    .footer-links a:hover { color: var(--accent); }
    .lang-switch{cursor:pointer}
    .card-link{text-decoration:none;color:inherit}
    .hero img{border-radius:1rem}
    #brand{cursor:pointer}
    #app-version {
      position: fixed;
      bottom: .6rem;
      right: .8rem;
      font-size: .7rem;
      color: var(--muted);
      opacity: .45;
      pointer-events: none;
      z-index: 1000;
    }

    /* Toast de erro */
    #error-toast {
      position: fixed;
      top: 1rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      min-width: 320px;
      max-width: 90vw;
      background: #2a1a1a;
      border: 1px solid #7f2b2b;
      border-radius: .5rem;
      color: #f5c6cb;
      padding: .75rem 1.25rem;
      display: flex;
      align-items: center;
      gap: .75rem;
      box-shadow: 0 4px 24px rgba(0,0,0,.5);
      opacity: 0;
      pointer-events: none;
      transition: opacity .3s ease;
    }
    #error-toast.show {
      opacity: 1;
      pointer-events: auto;
    }
    #error-toast .toast-icon { font-size: 1.1rem; flex-shrink: 0; }
    #error-toast .toast-msg { flex: 1; font-size: .9rem; }
    #error-toast .toast-close {
      cursor: pointer;
      background: none;
      border: none;
      color: #f5c6cb;
      font-size: 1rem;
      line-height: 1;
      padding: 0;
      opacity: .7;
    }
    #error-toast .toast-close:hover { opacity: 1; }
  </style>
</head>
<body>

<div id="app-version">v.0.2</div>

<!-- Toast de erro -->
<div id="error-toast" role="alert" aria-live="assertive">
  <span class="toast-icon">⚠️</span>
  <span class="toast-msg" id="error-toast-msg"></span>
  <button class="toast-close" onclick="hideToast()" aria-label="Fechar">✕</button>
</div>

<nav class="navbar navbar-expand-lg border-bottom">
  <div class="container">
    <a class="navbar-brand" id="brand" href="/">Likwi — Renato Fagalde</a>
    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div id="nav" class="collapse navbar-collapse">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a id="nav_home" class="nav-link active" href="/">Home</a></li>
        <li class="nav-item"><a id="nav_projects" class="nav-link" href="/projects.html">Projects</a></li>
        <li class="nav-item"><a id="nav_blog" class="nav-link" href="/blog.html">Blog</a></li>
        <li class="nav-item dropdown">
          <a class="nav-link dropdown-toggle lang-switch" data-bs-toggle="dropdown">🌐</a>
          <ul class="dropdown-menu dropdown-menu-end">
            <li><a class="dropdown-item" data-lang="en">English</a></li>
            <li><a class="dropdown-item" data-lang="pt-BR">Português (BR)</a></li>
          </ul>
        </li>
      </ul>
    </div>
  </div>
</nav>

<section class="hero">
  <div class="container">
    <div class="row align-items-center g-5">
      <div class="col-md-6">
        <h1 id="hero_title" class="display-5 fw-bold"></h1>
        <p id="hero_sub" class="lead text-muted"></p>
        <a id="cta_contact" class="btn btn-dark btn-lg mt-3"
           href="https://www.linkedin.com/in/renatofagalde/"
           target="_blank" rel="noopener"></a>
      </div>
      <div class="col-md-6">
        <img src="/img/hero.png" alt="Tech cloud" class="img-fluid">
      </div>
    </div>
  </div>
</section>

<section class="py-5 border-top">
  <div class="container">
    <h2 id="section_projects" class="mb-4"></h2>
    <div class="row g-4">
      <div class="col-md-4">
        <a class="card-link" href="/projects.html#tiss">
          <div class="card h-100 shadow-sm">
            <div class="card-body">
              <h5 id="card_tiss_title" class="card-title"></h5>
              <p id="card_tiss_desc" class="card-text text-muted"></p>
            </div>
          </div>
        </a>
      </div>
      <div class="col-md-4">
        <a class="card-link" href="/projects.html#pandaparking">
          <div class="card h-100 shadow-sm">
            <div class="card-body">
              <h5 id="card_parking_title" class="card-title"></h5>
              <p id="card_parking_desc" class="card-text text-muted"></p>
            </div>
          </div>
        </a>
      </div>
      <div class="col-md-4">
        <a class="card-link" href="/projects.html#remotework">
          <div class="card h-100 shadow-sm">
            <div class="card-body">
              <h5 id="card_remote_title" class="card-title"></h5>
              <p id="card_remote_desc" class="card-text text-muted"></p>
            </div>
          </div>
        </a>
      </div>
    </div>
  </div>
</section>

<footer class="py-4 text-center border-top">
  <div class="footer-links mb-2">
    <span id="footer_links">Links:</span>
    &nbsp;<a id="footer_linkedin" href="https://www.linkedin.com/in/renatofagalde/" target="_blank" rel="noopener">LinkedIn</a>
    &nbsp;·&nbsp;<a id="footer_github" href="https://github.com/renatofagalde/" target="_blank" rel="noopener">GitHub</a>
  </div>
  <small id="footer_rights">© <span id="year"></span> Likwi.</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  const API_URL = "https://o5hqvo0l0d.execute-api.us-east-1.amazonaws.com/production/notes/likwi";

  // ---- Toast ----
  let toastTimer = null;
  function showToast(msg, durationMs = 4000) {
    const toast = document.getElementById("error-toast");
    document.getElementById("error-toast-msg").textContent = msg;
    toast.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(hideToast, durationMs);
  }
  function hideToast() {
    document.getElementById("error-toast").classList.remove("show");
    clearTimeout(toastTimer);
  }

  // ---- Lang ----
  function detectLang() {
    const n = (navigator.languages && navigator.languages[0]) || navigator.language || "en";
    return n.startsWith("pt") ? "pt-BR" : "en";
  }

  let currentLang = localStorage.getItem("lang") || detectLang();
  let notePromise = null;

  async function fetchRawNote() {
    const res = await fetch(API_URL, {
      cache: "no-store",
      headers: { "X-Correlation-ID": crypto.randomUUID() }
    });
    if (res.status === 429) {
      const msg = currentLang === "pt-BR"
              ? "Muitas requisições. Por favor, aguarde alguns instantes."
              : "Too many requests. Please wait a moment.";
      showToast(msg);
      throw new Error("rate_limited");
    }
    if (!res.ok) {
      throw new Error("Erro ao buscar nota: " + res.status);
    }
    return res.json();
  }

  function normalizeNote(raw) {
    if (!raw) return null;
    if (raw.translations) return raw;
    if (raw.content && raw.content.translations) {
      return {
        id: raw.content.id || raw.id,
        name: raw.content.name || raw.name,
        translations: raw.content.translations
      };
    }
    console.warn("Formato de nota inesperado:", raw);
    return null;
  }

  async function loadNote() {
    if (!notePromise) {
      notePromise = fetchRawNote()
              .then(normalizeNote)
              .catch(err => {
                console.error("Erro ao carregar nota:", err);
                return null;
              });
    }
    return notePromise;
  }

  async function loadLocale(lang) {
    const note = await loadNote();
    if (!note || !note.translations) return {};
    return note.translations[lang] || note.translations["en"] || {};
  }

  function tAssign(dict, id) {
    const el = document.getElementById(id);
    if (el && dict[id]) el.textContent = dict[id];
  }

  async function applyLang(lang) {
    const dict = await loadLocale(lang);
    [
      "brand", "nav_home", "nav_projects", "nav_blog",
      "hero_title", "hero_sub", "cta_contact",
      "section_projects",
      "card_tiss_title", "card_tiss_desc",
      "card_parking_title", "card_parking_desc",
      "card_remote_title", "card_remote_desc",
      "footer_links", "footer_linkedin", "footer_github", "footer_rights"
    ].forEach(id => tAssign(dict, id));

    const note = await loadNote();
    if (note && note.name) document.title = note.name;

    document.documentElement.lang = (lang === "pt-BR" ? "pt-BR" : "en");
    localStorage.setItem("lang", lang);
  }

  // ---- Brand: limpa e recarrega ----
  document.getElementById("brand").addEventListener("click", function(e) {
    e.preventDefault();
    notePromise = null;
    [
      "hero_title", "hero_sub", "cta_contact",
      "section_projects",
      "card_tiss_title", "card_tiss_desc",
      "card_parking_title", "card_parking_desc",
      "card_remote_title", "card_remote_desc",
      "footer_links", "footer_linkedin", "footer_github", "footer_rights"
    ].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.textContent = "";
    });
    applyLang(currentLang);
  });

  // ---- Lang switcher ----
  document.addEventListener("click", e => {
    if (e.target.matches("[data-lang]")) {
      currentLang = e.target.getAttribute("data-lang");
      applyLang(currentLang);
    }
  });

  document.getElementById("year").textContent = new Date().getFullYear();
  applyLang(currentLang);
</script>

</body>
</html>
